server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Reverse proxy for local database backend
    location /api/db {
        proxy_pass http://finstar-server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Disable caching
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Reverse proxy for Yahoo Finance to bypass CORS restrictions on real domains
    location /api/yahoo/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)";
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_buffering off;
    }

    # Enable gzip compression for optimization
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
